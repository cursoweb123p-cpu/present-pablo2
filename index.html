<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pablo Cortés | Perito Valuador</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f2027;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* FONDO PARTÍCULAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* TARJETA */
.card {
    width: 340px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    text-align: center;
    color: #fff;
    transition: transform 0.2s;
    animation: entrada 1.2s ease;
}

/* ANIMACIÓN ENTRADA */
@keyframes entrada {
    from {opacity:0; transform: translateY(50px);}
    to {opacity:1; transform: translateY(0);}
}

/* FOTO */
.profile {
    width: 95px;
    height: 95px;
    border-radius: 50%;
    border: 3px solid #00eaff;
    margin-bottom: 10px;
    animation: flotar 3s infinite ease-in-out;
}

@keyframes flotar {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}

/* TEXTOS */
h2 { margin: 5px; }
.subtitle { color: #00eaff; font-size: 14px; }

/* SERVICIOS */
.services {
    margin: 15px 0;
    font-size: 14px;
    line-height: 1.6;
}

/* BOTONES */
.btn {
    display: block;
    margin: 10px auto;
    padding: 12px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    color: white;
    transition: 0.3s;
    cursor: pointer;
}

.whatsapp { background: #25D366; }
.call { background: #007BFF; }
.save { background: #444; }

.btn:hover {
    transform: scale(1.08);
}

/* EFECTO BRILLO */
.card:hover {
    box-shadow: 0 25px 80px rgba(0,0,0,0.9);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="card" id="card">

    <img src="sellon.png" class="profile">

    <h2>Pablo Cortés Flores</h2>
    <div class="subtitle">Perito Valuador Profesional</div>

    <div class="services">
        🏠 Bienes Inmuebles <br>
        🪑 Bienes Muebles <br>
        ⚙️ Maquinaria y Equipo <br>
        🏢 Empresas <br>
        💡 Activos Intangibles
    </div>

    <a href="https://wa.me/522414105584?text=Hola,%20necesito%20un%20avalúo" 
       class="btn whatsapp">
       📲 Solicitar Avalúo
    </a>

    <a href="tel:+522414105584" class="btn call">
        📞 Llamar
    </a>

    <div class="btn save" onclick="guardarContacto()">
        💾 Guardar contacto
    </div>

</div>

<script>
/* EFECTO 3D */
const card = document.getElementById('card');

document.addEventListener('mousemove', (e) => {
    let x = (window.innerWidth / 2 - e.pageX) / 30;
    let y = (window.innerHeight / 2 - e.pageY) / 30;
    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* PARTÍCULAS */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        d: Math.random() * 1
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    });

    update();
}

function update() {
    particles.forEach(p => {
        p.y += p.d;
        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }
    });
}

setInterval(draw, 30);

/* GUARDAR CONTACTO */
function guardarContacto() {
    const vcard = `
BEGIN:VCARD
VERSION:3.0
FN:Pablo Cortés Flores
ORG:Perito Valuador
TITLE:Valuación Profesional
TEL;TYPE=CELL:+522414105584
EMAIL:tuemail@gmail.com
END:VCARD
`;

    const blob = new Blob([vcard], { type: "text/vcard" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "contacto.vcf";
    link.click();
}
</script>

<script>

// ✅ OPCIONAL: Anti iframe (no afecta WhatsApp)
if (window.top !== window.self) {
    document.body.innerHTML = "<h2 style='color:white;text-align:center'>Acceso no permitido</h2>";
}

// ✅ OPCIONAL: Bloquear clic derecho (básico)
document.addEventListener('contextmenu', e => e.preventDefault());

// 🚀 SISTEMA CLIENTES
function enviar() {
    let nombre = document.getElementById("nombre").value;
    let telefono = document.getElementById("telefono").value;

    let msg = `Hola, soy ${nombre}%0ATel: ${telefono}`;
    window.open(`https://wa.me/5212414105584?text=${msg}`);
}

</script>
</body>
</html>
